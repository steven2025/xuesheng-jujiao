    function normalizeStrengthCandidates(data) {
      let candidates = [];

      if (Array.isArray(data)) {
        candidates = data;
      } else if (data && Array.isArray(data.strength_candidates)) {
        candidates = data.strength_candidates;
      } else if (data && Array.isArray(data.candidates)) {
        candidates = data.candidates;
      } else if (data && Array.isArray(data.list)) {
        candidates = data.list;
      }

      const normalized = candidates
        .map((item) => {
          if (typeof item === "string") {
            return { type: item.trim(), reason: "" };
          }
          if (item && typeof item === "object") {
            return {
              type: String(item.type || item.label || item.name || item.value || "").trim(),
              reason: String(item.reason || item.description || "").trim()
            };
          }
          return { type: "", reason: "" };
        })
        .filter((item) => item.type && DEFAULT_STRENGTH_OPTIONS.includes(item.type));

      const fallbackMap = getFallbackStrengthCandidateCards(state);
      const merged = normalized.map((item) => {
        const fallback = fallbackMap.find((x) => x.type === item.type);
        return {
          type: item.type,
          reason: item.reason || (fallback && fallback.reason) || buildStrengthReason(item.type, state, state.local_rules || {})
        };
      });

      const deduped = dedupeCandidateObjects(merged);

      if (deduped.length < 2) {
        const supplement = fallbackMap.filter((item) => !deduped.some((x) => x.type === item.type));
        return [...deduped, ...supplement].slice(0, 3);
      }

      return deduped.slice(0, 3);
    }

    function normalizeDiagnosisData(data, fallback) {
      const fallbackData = fallback || {};
      const output = {
        profile_tag: String(data.profile_tag || fallbackData.profile_tag || state.local_rules.preliminary_profile_tag || "聚焦反馈"),
        core_problem: String(data.core_problem || fallbackData.core_problem || "你现在更需要做的，不是再加努力，而是让主线更清楚。"),
        mainline_recommendation: String(data.mainline_recommendation || fallbackData.mainline_recommendation || "先保留一条主线。"),
        reduce_recommendation: String(data.reduce_recommendation || fallbackData.reduce_recommendation || "把低回报事务先降频。"),
        next_action: String(data.next_action || fallbackData.next_action || "未来 7 天做两个固定推进动作。"),
        confirmed_strength: String(data.confirmed_strength || state.strength_confirmation || ""),
        strength_fit_direction: String(data.strength_fit_direction || fallbackData.strength_fit_direction || state.local_rules.strongest_activity_reason || ""),
        closing_quote: String(data.closing_quote || fallbackData.closing_quote || "")
      };
      return output;
    }

    
    function normalizeRenderedResult(data, diagnosis) {
      const diagnosisView = renderDiagnosisResult(diagnosis || {});
      const adviceList = normalizeAdviceList(data && data.advice_list, diagnosisView.advice_list);
      return {
        ...diagnosisView,
        title: String((data && data.title) || diagnosisView.title || "聚焦反馈"),
        personal_intro: String((data && data.personal_intro) || diagnosisView.personal_intro || buildPersonalIntro()),
        one_liner: String((data && data.one_liner) || diagnosisView.one_liner || ""),
        strength_text: String((data && data.strength_text) || diagnosisView.strength_text || ""),
        advice_list: adviceList,
        closing_quote: String((data && data.closing_quote) || diagnosisView.closing_quote || ""),
        reasoning_summary: String((data && data.reasoning_summary) || diagnosisView.reasoning_summary || ""),
        metrics: diagnosisView.metrics
      };
    }

    
    function getDisplayResultModel() {
      const diagnosisView = state.diagnosis_result && Object.keys(state.diagnosis_result).length
        ? renderDiagnosisResult(state.diagnosis_result)
        : renderFallbackResult();

      if (state.rendered_result && state.rendered_result.title) {
        return {
          ...diagnosisView,
          ...state.rendered_result,
          advice_list: normalizeAdviceList(state.rendered_result.advice_list, diagnosisView.advice_list),
          metrics: diagnosisView.metrics,
          reasoning_summary: state.rendered_result.reasoning_summary || diagnosisView.reasoning_summary
        };
      }

      return diagnosisView;
    }

    function getFallbackStrengthCandidates(currentState) {
      const local = currentState.local_rules && Object.keys(currentState.local_rules).length
        ? currentState.local_rules
        : runLocalRules(currentState);

      const strongestName = local.strongest_activity_name;
      const strongest = currentState.activities.find((item) => item.name.trim() === strongestName);

      const picks = [];

      if (strongest) {
        if (["项目/科研", "实习/兼职", "竞赛/考试"].includes(strongest.category)) {
          picks.push("项目推进型");
        }
        if (["课程学习", "项目/科研"].includes(strongest.category) && ["有阶段性成果", "有可展示成果", "已经做得比较突出"].includes(strongest.achievement_level)) {
          picks.push("持续深挖型");
        }
        if (["社团/学生工作"].includes(strongest.category)) {
          picks.push("组织协同型");
        }
        if (["兴趣/自我提升", "其他"].includes(strongest.category) && strongest.energy_state === "越做越有劲") {
          picks.push("创意探索型");
        }
      }

      if (Number(currentState.scale_answers.q7) >= 4) {
        picks.push("持续深挖型");
      }
      if (Number(currentState.scale_answers.q8) >= 4) {
        picks.push("稳定耐力型");
      }
      if (Number(currentState.scale_answers.q6) >= 4 && ["社团/学生工作", "项目/科研"].some((cat) => currentState.activities.some((a) => a.category === cat))) {
        picks.push("项目推进型");
      }
      if (Number(currentState.scale_answers.q5) <= 2 && Number(currentState.scale_answers.q1) >= 3) {
        picks.push("稳定耐力型");
      }

      const result = dedupeArray([...picks, ...DEFAULT_STRENGTH_OPTIONS]).filter((item) => item !== "还不确定 / 系统看走眼了");
      return result.slice(0, 3);
    }

    function buildFallbackDiagnosis(tag, currentState, strongest, lowValue, mainlinePick, reducePick, timeMismatch) {
      const strengthHint = currentState.strength_confirmation || guessStrengthLabel(strongest, currentState);
      let coreProblem = "";
      let mainlineRecommendation = "";
      let reduceRecommendation = "";
      let nextAction = "";

      if (tag === "高忙碌低聚焦型") {
        coreProblem = "你现在更像是事情很多、节奏很满，但主线还没有被明确写出来，所以每件事都像要做，结果谁都没真正吃透。";
        mainlineRecommendation = `这学期先把主线收束到「${mainlinePick}」，它要成为你排时间时默认优先的那一件。`;
        reduceRecommendation = `把「${reducePick}」从默认全开改成有上限参与，不再让它无限吃掉你的注意力。`;
        nextAction = `未来 7 天，把和「${mainlinePick}」有关的两次固定推进时段先锁进日程里，每次 60-90 分钟。`;
      } else if (tag === "主线模糊型") {
        coreProblem = "你不是不努力，而是目标、能力和时间之间还没对齐，所以容易忙着忙着就失去判断标准。";
        mainlineRecommendation = `先给「${mainlinePick}」一个更明确的定义：这学期它要产出什么，做到什么程度，才算真的在推进。`;
        reduceRecommendation = `把「${reducePick}」从“继续做”改成“只保留最低必要投入”，别让不确定感逼你什么都留。`;
        nextAction = `这一周写下一个 3 行版主线说明：我要押注什么、为什么是它、接下来先推进哪一步。`;
      } else if (tag === "时间错配型") {
        coreProblem = timeMismatch
          ? "你最重要的事和最耗时间的事不是同一件，这意味着你心里的主线和日历里的主线还没对上。"
          : "你现在的时间分配和真正想要的结果之间，已经出现了错位。";
        mainlineRecommendation = `把「${mainlinePick}」设成每周固定投入项，先保证它有稳定、可见的时间块。`;
        reduceRecommendation = `优先给「${reducePick}」设上限：能降频就降频，不能降频就限定每周投入时长。`;
        nextAction = `接下来 7 天做一次时间对账：把实际花时写下来，看是不是在为「${mainlinePick}」留出了足够窗口。`;
      } else if (tag === "已有优势但用错地方型") {
        coreProblem = "你并不是没有优势，问题更像是你已经有一块做得出来的地方，但它和当前目标之间还没连上。";
        mainlineRecommendation = `尝试把你的优势方向「${strengthHint}」重新接到「${mainlinePick}」上，让成果能对你的阶段目标更有积累感。`;
        reduceRecommendation = `如果「${reducePick}」只是让你持续消耗但不能积累优势，建议尽快降频，不再把高质量时间投进去。`;
        nextAction = `这一周先做一个小动作：把你最有把握的一项能力，转成一个能展示、能复用、能继续沉淀的小成果。`;
      } else if (tag === "已聚焦但噪音过多型") {
        coreProblem = "你的主线其实已经有了，但周围的临时任务、比较心态或额外承诺还在不断打断它。";
        mainlineRecommendation = `继续把「${mainlinePick}」放在首位，并给它设一个不被轻易挤占的固定推进时段。`;
        reduceRecommendation = `对「${reducePick}」做一次降频，不一定彻底放掉，但要明确：它不能再挤进你的黄金时间。`;
        nextAction = `未来一周试一次“先主线后回应”：先完成主线推进，再处理额外请求或临时事务。`;
      } else {
        coreProblem = "你已经有一定聚焦基础，但接下来真正拉开差距的，不是再多做几件事，而是把优势持续压到一条线上。";
        mainlineRecommendation = `把「${mainlinePick}」继续保留下来，并给它更清晰的节奏和阶段结果。`;
        reduceRecommendation = `如果「${reducePick}」不是必须项，就把它降到维持型投入，不要再占用高质量时段。`;
        nextAction = `接下来 7 天，把一项你已经有推进感的事情再往前推一步，尽量形成一个可展示的小结果。`;
      }

      return {
        profile_tag: tag,
        core_problem: coreProblem,
        mainline_recommendation: mainlineRecommendation,
        reduce_recommendation: reduceRecommendation,
        next_action: nextAction,
        confirmed_strength: currentState.strength_confirmation || "",
        strength_fit_direction: strongest ? buildStrongestReason(strongest) : `你更适合把自己的优势放在「${mainlinePick}」这条线里持续做深，而不是平均分配到每一件事上。`,
        closing_quote: "不是所有事情都值得同时推进。能留下来的那条线，才有机会变成真正的积累。"
      };
    }

    function buildStrongestReason(activity) {
      if (!activity) return "你最值得押注的，往往是那些你能做出一点成果、而且越做越有劲的事情。";
      const bits = [];
      if (activity.goal_relevance >= 4) bits.push("和你当前目标关系很近");
      if (activity.achievement >= 3) bits.push("已经不只是参与，而是有了推进或成果");
      if (activity.energy >= 4) bits.push("你做它时不是硬撑，而是有投入感");
      if (activity.hours >= 7) bits.push("你也确实在给它分配时间");
      const text = bits.length ? bits.join("、") : "它已经显示出一些可继续放大的信号";
      return `「${activity.name}」更像你值得押注的方向，因为它${text}。`;
    }

    function buildLowValueReason(activity) {
      if (!activity) return "目前还没有特别明显的高耗时低回报项。";
      const reasons = [];
      if (activity.hours >= 11) reasons.push("花时明显偏高");
      if (activity.relevance <= 2) reasons.push("和当前目标关系偏弱");
      if (activity.achievement <= 2) reasons.push("投入不少，但成果感还不强");
      const text = reasons.length ? reasons.join("，") : "它可能正在吃掉你的注意力";
      return `「${activity.name}」值得警惕，因为它${text}。`;
    }

    function guessStrengthLabel(strongest, currentState) {
      if (!strongest) {
        if (Number(currentState.scale_answers.q8) >= 4) return "稳定耐力型";
        return "持续深挖型";
      }
      if (["项目/科研", "实习/兼职", "竞赛/考试"].includes(strongest.category)) return "项目推进型";
      if (["社团/学生工作"].includes(strongest.category)) return "组织协同型";
      if (["兴趣/自我提升", "其他"].includes(strongest.category) && strongest.energy >= 4) return "创意探索型";
      if (strongest.achievement >= 4 && strongest.energy >= 4) return "持续深挖型";
      return "稳定耐力型";
    }

    
    function buildReportPayload() {
      const result = getDisplayResultModel();
      const local = state.local_rules || {};
      const metrics = buildMetricViewModels(result.metrics || {}, local);
      const today = new Date();
      const dateDisplay = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;
      const nameForDisplay = (state.student_name || "").trim() || "同学";
      const filenameBase = `${nameForDisplay}_聚焦评估报告_${dateDisplay}`;
      return {
        student_name: (state.student_name || "").trim(),
        grade: (state.grade || "").trim(),
        major: (state.major || "").trim(),
        title: result.title,
        one_liner: result.one_liner,
        strength_text: result.strength_text,
        advice_list: normalizeAdviceList(result.advice_list, []),
        closing_quote: result.closing_quote,
        date_display: dateDisplay,
        personal_intro: result.personal_intro || buildPersonalIntro(),
        filename_base: filenameBase,
        reasoning_summary: result.reasoning_summary || "",
        metrics,
        strongest_activity_name: local.strongest_activity_name || "",
        low_value_high_time_activity: local.low_value_high_time_activity || "",
        time_mismatch_text: local.time_mismatch_flag ? "是。你嘴上最重要的，和日历里最耗时的，还不是同一件。" : "暂时不明显。你的时间分配与重点还算一致。"
      };
    }

    function buildFileName(ext) {
      const report = buildReportPayload();
      return `${report.filename_base}${ext}`;
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    function syncProfileDrawerInputs() {
      const nameInput = document.getElementById("student_name");
      const gradeInput = document.getElementById("grade");
      const majorInput = document.getElementById("major");
      if (nameInput) nameInput.value = state.student_name || "";
      if (gradeInput) gradeInput.value = state.grade || "";
      if (majorInput) majorInput.value = state.major || "";
      updateProfileStatus();
    }

    function updateProfileStatus() {
      const badge = document.getElementById("profileStatusBadge");
      if (badge) {
        badge.textContent = state.login_confirmed ? "已确认" : "未确认";
      }
    }

    function normalizeAdviceList(list, fallback) {
      const arr = Array.isArray(list) ? list : [];
      const normalized = arr
        .map((item) => String(item || "").trim())
        .filter(Boolean);

      const defaults = (fallback || []).map((item) => String(item || "").trim()).filter(Boolean);
      const merged = dedupeArray([...normalized, ...defaults]);

      while (merged.length < 3) {
        merged.push("先把主线留出来，再决定哪些事值得继续加码。");
      }
      return merged.slice(0, 3);
    }

    function dedupeArray(list) {
      return list.filter((item, index) => item && list.indexOf(item) === index);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/"/g, "&quot;");
    }



    function normalizeCandidateList(list) {
      if (!Array.isArray(list)) return [];
      return list
        .map((item) => {
          if (typeof item === "string") {
            return { type: item.trim(), reason: "" };
          }
          return {
            type: String(item && item.type || "").trim(),
            reason: String(item && item.reason || "").trim()
          };
        })
        .filter((item) => item.type);
    }

    function dedupeCandidateObjects(list) {
      return list.filter((item, index, arr) => arr.findIndex((x) => x.type === item.type) === index);
    }

    function getFallbackStrengthCandidateCards(currentState) {
      const local = currentState.local_rules && Object.keys(currentState.local_rules).length
        ? currentState.local_rules
        : runLocalRules(currentState);

      const base = getFallbackStrengthCandidates(currentState)
        .map((type) => ({
          type,
          reason: buildStrengthReason(type, currentState, local)
        }));

      return dedupeCandidateObjects(base).slice(0, 3);
    }

    function buildStrengthReason(type, currentState, local) {
      const strongest = (currentState.activities || []).find((item) => item.name.trim() === String(local.strongest_activity_name || "").trim());
      const defaultReason = {
        "持续深挖型": "你更像那种把一件事越做越深的人。不是一上来就炸场，但只要给足连续时间，就能把成果慢慢压出来。",
        "项目推进型": "你在有节点、有交付、有推进感的场景里更容易进入状态。给你一个目标，你更擅长往前拱。",
        "表达输出型": "你的优势不只是理解，更在于说清楚、讲明白、把想法转成别人能接住的表达。",
        "组织协同型": "你更像能把人和事拢到一起的人。事情散着时，你反而更容易看见秩序。",
        "创意探索型": "你不是靠标准答案出活的人。给你一点空间，你更容易做出有辨识度的东西。",
        "稳定耐力型": "你最值钱的地方，不是爆发，而是能把一件不显山不露水的事稳稳做下去。",
        "还不确定 / 系统看走眼了": "现在这些标签都不够像你。先不急着认领人设，诚实地保留空白，也是很强的判断。"
      }[type] || "你有自己的节奏，只是这股劲头还没被摆到最合适的位置。";

      if (!strongest) return defaultReason;

      if (type === "持续深挖型") {
        return `你在「${strongest.name}」上已经有一点持续推进的样子了。它不是最热闹的选项，但很可能是最能沉淀资产的那条线。`;
      }
      if (type === "项目推进型") {
        return `你在「${strongest.name}」这类有节点、有结果的事情上更容易起势。你不是靠空想驱动，更像靠推进把局面做出来。`;
      }
      if (type === "组织协同型") {
        return `你做事不一定最爱单兵冲锋，但更擅长把节奏、人和资源拢到一起。这种能力放对位置，后劲很大。`;
      }
      if (type === "创意探索型") {
        return `你一旦遇到愿意投入、又有空间发挥的事情，状态会明显不一样。那种“越做越有劲”的感觉，不该被杂务冲掉。`;
      }
      if (type === "稳定耐力型") {
        return `从你的填写看，你不是靠三分钟热度顶着走的人。你更适合把连续时间压在一条值得长期积累的线里。`;
      }
      if (type === "表达输出型") {
        return `你很可能不是纯闷头型。你更适合在“梳理、输出、讲清楚、做成可展示成果”这类场景里放大存在感。`;
      }
      return defaultReason;
    }

    function getProfileNarrative(local) {
      const tag = local.preliminary_profile_tag || "稳步积累型";
      const map = {
        "高忙碌低聚焦型": "你不是没在干活，而是几条线一起抢镜，导致真正值得押注的那件事，一直没拿到完整时间。",
        "主线模糊型": "你的问题不是懒，是目标、时间和能力没完全对齐。事情都在做，但还没有哪件事真正坐上主位。",
        "时间错配型": "你心里知道哪件事重要，但日历并不买账。嘴上说主线，时间却还在给别的事务站台。",
        "已有优势但用错地方型": "你其实已经有一块能打的地方，只是它还没被接到当前目标上，所以力气出了，资产感却不够强。",
        "已聚焦但噪音过多型": "主线并不是没有，只是周围的杂音太勤，主线老被打断，气质有了，节奏还差一点狠劲。",
        "稳步积累型": "你已经有一点主线意识了。现在最该做的，不是再加项目，而是把节奏再收紧一点。"
      };
      return map[tag] || "你现在更需要的是把最值得投入的那件事，重新放回前排。";
    }

    function getStrengthConfidence(type, currentState, local) {
      const q = currentState.scale_answers || {};
      const strongestName = String(local.strongest_activity_name || "").trim();
      const strongest = (currentState.activities || []).find((item) => item.name.trim() === strongestName) || {};
      let score = 58;

      if (type === "持续深挖型") {
        if (["课程学习", "项目/科研"].includes(strongest.category)) score += 12;
        if (Number(q.q7) >= 4) score += 8;
        if (Number(q.q8) >= 4) score += 10;
        if (Number(local.mainline_clarity_local) >= 60) score += 6;
      } else if (type === "项目推进型") {
        if (["项目/科研", "竞赛/考试", "实习/兼职"].includes(strongest.category)) score += 14;
        if (Number(q.q6) >= 4) score += 7;
        if (Number(local.focus_score_local) >= 55) score += 5;
      } else if (type === "表达输出型") {
        if (String(currentState.optional_strength_feedback || "").includes("说")) score += 8;
        if (["社团/学生工作", "课程学习"].includes(strongest.category)) score += 6;
        score += 4;
      } else if (type === "组织协同型") {
        if (["社团/学生工作"].includes(strongest.category)) score += 14;
        if (Number(q.q6) >= 4) score += 6;
        if (Number(q.q1) >= 3) score += 4;
      } else if (type === "创意探索型") {
        if (["兴趣/自我提升", "其他"].includes(strongest.category)) score += 12;
        if (Number(q.q8) >= 4) score += 5;
        if (String(strongest.energy_state || "") === "越做越有劲") score += 8;
      } else if (type === "稳定耐力型") {
        if (Number(q.q8) >= 4) score += 10;
        if (Number(q.q1) >= 3) score += 6;
        if (Number(local.mainline_clarity_local) >= 55) score += 8;
      } else if (type === "还不确定 / 系统看走眼了") {
        score = 50;
        if (Number(local.mainline_clarity_local) < 45) score += 8;
        if (!currentState.strength_confirmation) score += 6;
      }

      return clamp(Math.round(score), 48, 92);
    }

    function getStrengthSignalTags(type, currentState, local) {
      const strongestName = String(local.strongest_activity_name || "").trim();
      const strongest = (currentState.activities || []).find((item) => item.name.trim() === strongestName) || {};
      const tags = [];

      if (strongest.goal_relevance === "高相关") tags.push("和当前目标贴得近");
      if (strongest.achievement_level && strongest.achievement_level !== "刚开始/只是参与") tags.push("不只是参与");
      if (strongest.energy_state === "越做越有劲" || strongest.energy_state === "比较投入") tags.push("做起来不全靠硬撑");
      if (local.time_mismatch_flag) tags.push("需要把时间拉回主线");
      if (Number(local.mainline_clarity_local) >= 60) tags.push("主线意识不差");

      if (type === "项目推进型") tags.unshift("适合节点型任务");
      if (type === "持续深挖型") tags.unshift("适合长期积累");
      if (type === "组织协同型") tags.unshift("适合拢人和节奏");
      if (type === "表达输出型") tags.unshift("适合做成可展示成果");
      if (type === "创意探索型") tags.unshift("适合留一点空间感");
      if (type === "稳定耐力型") tags.unshift("适合慢热但持久");
      if (type === "还不确定 / 系统看走眼了") {
        return ["暂不认领标签", "先保留空白", "比硬配人设强"];
      }

      return dedupeArray(tags).slice(0, 4);
    }

    function renderStrengthCandidateCard(item, index, local) {
      const type = item.type;
      const checked = state.strength_confirmation === type;
      const score = getStrengthConfidence(type, state, local);
      const tags = getStrengthSignalTags(type, state, local);
      const scoreText = score >= 82 ? "高匹配" : score >= 68 ? "比较像" : score >= 56 ? "可考虑" : "保留观察";

      return `
        <label class="candidate-card">
          <input
            type="radio"
            name="strength_confirmation_card"
            value="${escapeAttr(type)}"
            data-field="strength_confirmation"
            ${checked ? "checked" : ""}
          />
          <span class="candidate-card-body">
            <div class="candidate-top">
              <span class="candidate-title">${escapeHtml(type)}</span>
              <span class="candidate-score">${scoreText} · ${score}</span>
            </div>
            <div class="match-bar"><span style="width:${score}%"></span></div>
            <div class="candidate-tag-list">
              ${tags.map((tag) => `<span class="candidate-tag">${escapeHtml(tag)}</span>`).join("")}
            </div>
            <p class="candidate-reason">${escapeHtml(item.reason || buildStrengthReason(type, state, local))}</p>
            <p class="candidate-footnote">${escapeHtml(getStrengthFootnote(type, score))}</p>
          </span>
        </label>
      `;
    }

    function getStrengthFootnote(type, score) {
      if (type === "还不确定 / 系统看走眼了") {
        return "这不是否定自己，而是拒绝随便认领一个不贴身的标签。";
      }
      if (score >= 82) return "这张卡不只是好看，和你当前的真实投入也比较对得上。";
      if (score >= 68) return "这张卡有明显贴合点，值得优先考虑。";
      return "这张卡不算离谱，但还需要你自己判断它是不是你真正想押注的那股劲。";
    }

    function renderSignalChip(text, tone) {
      return `<span class="signal-chip ${escapeAttr(tone || "primary")}">${escapeHtml(text)}</span>`;
    }

    function buildMetricViewModels(metrics, local) {
      const safeMetrics = {
        focus_level: clamp(Number(metrics.focus_level || local.focus_score_local || 58), 0, 100),
        mainline_clarity: clamp(Number(metrics.mainline_clarity || local.mainline_clarity_local || 60), 0, 100),
        time_mismatch: clamp(Number(metrics.time_mismatch || (local.time_mismatch_flag ? 84 : 32)), 0, 100),
        comparison_drive: clamp(Number(metrics.comparison_drive || local.comparison_drive_local || 40), 0, 100)
      };

      return [
        {
          key: "focus_level",
          label: "聚焦度",
          value: safeMetrics.focus_level,
          tone: getMetricTone(safeMetrics.focus_level, false),
          description: explainMetric("focus_level", safeMetrics.focus_level)
        },
        {
          key: "mainline_clarity",
          label: "主线清晰度",
          value: safeMetrics.mainline_clarity,
          tone: getMetricTone(safeMetrics.mainline_clarity, false),
          description: explainMetric("mainline_clarity", safeMetrics.mainline_clarity)
        },
        {
          key: "time_mismatch",
          label: "时间错配指数",
          value: safeMetrics.time_mismatch,
          tone: getMetricTone(safeMetrics.time_mismatch, true),
          description: explainMetric("time_mismatch", safeMetrics.time_mismatch)
        },
        {
          key: "comparison_drive",
          label: "比较驱动指数",
          value: safeMetrics.comparison_drive,
          tone: getMetricTone(safeMetrics.comparison_drive, true),
          description: explainMetric("comparison_drive", safeMetrics.comparison_drive)
        }
      ];
    }

    function getMetricTone(value, reverse) {
      if (!reverse) {
        if (value >= 80) return "很稳";
        if (value >= 65) return "在线";
        if (value >= 50) return "可拉升";
        return "偏散";
      }
      if (value >= 80) return "偏高";
      if (value >= 65) return "有点抢戏";
      if (value >= 50) return "可控";
      return "不重";
    }

    function explainMetric(key, value) {
      if (key === "focus_level") {
        if (value >= 80) return "你已经有比较明确的节奏感，接下来拼的是持续兑现。";
        if (value >= 65) return "主线意识在线，但还会被杂务截流。";
        if (value >= 50) return "不是没方向，只是方向还没拿到足够整块时间。";
        return "现在更像在多线拉扯，主线还没有坐稳。";
      }
      if (key === "mainline_clarity") {
        if (value >= 80) return "你大概率知道自己这学期最该押注什么。";
        if (value >= 65) return "你对主线已有判断，但还可以再讲得更狠一点。";
        if (value >= 50) return "你隐约知道重点在哪，只是定义还不够硬。";
        return "目标、能力和时间还没完全对齐，容易边做边摇摆。";
      }
      if (key === "time_mismatch") {
        if (value >= 80) return "你最重要的事和最耗时的事，明显不是同一件。";
        if (value >= 65) return "日历正在替你做决定，主线还没真正拿回排班权。";
        if (value >= 50) return "有一点偏移，及时收手还来得及。";
        return "目前时间分配和主线大体站在一边。";
      }
      if (key === "comparison_drive") {
        if (value >= 80) return "你的很多动作容易被周围节奏带偏。";
        if (value >= 65) return "你会受环境影响，偶尔容易把别人的主线当自己的。";
        if (value >= 50) return "比较心态有一点，但还没坐到主位。";
        return "你相对能守住自己的节奏，不太容易被别人带跑。";
      }
      return "这是一个辅助判断信号。";
    }

    function renderMetricCard(item) {
      return `
        <div class="metric-card">
          <strong>${escapeHtml(item.label)}</strong>
          <div class="metric-head">
            <div class="metric-value">${item.value}</div>
            <div class="metric-tone">${escapeHtml(item.tone)}</div>
          </div>
          <div class="metric-bar"><span style="width:${item.value}%"></span></div>
          <p class="metric-desc">${escapeHtml(item.description)}</p>
        </div>
      `;
    }

    function explainOverallPattern(metrics, local) {
      const map = Object.fromEntries(metrics.map((item) => [item.key, item.value]));
      if (map.time_mismatch >= 70) {
        return "你现在最大的问题不叫“没方向”，而叫“时间没站队”。主线在脑子里，杂事在日历里，所以累是真累，沉淀却一般。";
      }
      if (map.focus_level < 55) {
        return "你并不是没有上进心，只是几条线同时抢戏，导致注意力像被分期付款，哪一边都没吃饱。";
      }
      if (map.comparison_drive >= 65) {
        return "你的节奏容易被外部参照带偏。别人一出成果，你就想临时换轨，这会让主线一直留在“差一点”的状态。";
      }
      return "你已经有一定聚焦基础。现在真正要做的，不是再扩项目，而是把值得长期积累的那条线再压实一点。";
    }

    function explainPriorityMove(metrics, local) {
      const map = Object.fromEntries(metrics.map((item) => [item.key, item.value]));
      const strongest = local.strongest_activity_name || "主线事项";
      const lowValue = local.low_value_high_time_activity || "低回报事务";
      if (map.time_mismatch >= 70) {
        return `先给「${strongest}」抢回完整时间块，再给「${lowValue}」设上限。先改排班，别先改情绪。`;
      }
      if (map.mainline_clarity < 55) {
        return `先用一句话定义「${strongest}」这学期到底要做到什么，再决定哪些事值得留下。没有定义，努力很容易白跑。`;
      }
      return `保住「${strongest}」的连续推进，再主动下调「${lowValue}」的存在感。别什么都做，先把最该做的做得像样。`;
    }

    function getAdviceEcho(index, text) {
      const notes = [
        "先让主线坐主位，再决定谁能旁听。",
        "礼貌可以留着，完整时间块别再随便外借。",
        "动作比口号值钱。排进日历，事情才算真的开始。"
      ];
      return notes[index] || "把建议变成排程，它才不会只停在看起来很对。";
    }

    window.addEventListener("DOMContentLoaded", initApp);
  </script>
</body>
</html>
